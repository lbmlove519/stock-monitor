<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GP-Tracker</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1a1a2e;
            --sub: #888;
            --up: #e83942;
            --down: #22a85d;
            --neutral: #666;
            --up-bg: #fef0f0;
            --down-bg: #eefaf3;
            --border: #e0e3eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container { width: 100%; max-width: 600px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .interval-control {
            display: flex;
            align-items: center;
            background: var(--card);
            border-radius: 24px;
            padding: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .interval-control button {
            width: 36px; height: 36px;
            border: none;
            background: transparent;
            font-size: 20px;
            cursor: pointer;
            color: #5a5a7a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .interval-control button:hover { background: #eef1f7; }
        .interval-display {
            padding: 0 12px;
            font-weight: 700;
            color: var(--text);
            font-size: 16px;
            min-width: 40px;
            text-align: center;
        }
        .action-buttons { display: flex; gap: 8px; }
        .action-buttons button {
            background: var(--card);
            border: none;
            border-radius: 50%;
            width: 36px; height: 36px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-panel {
            background: var(--card);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .add-panel textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            font-size: 15px;
            resize: vertical;
            font-family: inherit;
        }
        .add-panel-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            gap: 8px;
        }
        .add-panel-actions select,
        .add-panel-actions button {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #f8f9fc;
            font-size: 14px;
            cursor: pointer;
        }
        .hidden { display: none !important; }

        .stock-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }
        .stock-item {
            background: var(--card);
            border-radius: 12px;
            padding: 12px 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.15s;
        }
        .stock-item:hover { background: #fafbfe; }
        .name-code { flex: 1.5; min-width: 0; }
        .name {
            font-weight: 700;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .code { font-size: 11px; color: var(--sub); margin-top: 2px; }
        .price-area { flex: 1.5; text-align: right; }
        .price { font-size: 18px; font-weight: 800; font-variant-numeric: tabular-nums; }
        .change {
            font-size: 12px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 6px;
            margin-left: 4px;
            white-space: nowrap;
        }
        .change .percent { font-size: 10px; opacity: 0.85; margin-left: 2px; }
        .hl {
            display: flex;
            gap: 8px;
            font-size: 11px;
            color: var(--sub);
            white-space: nowrap;
            flex: 1;
        }
        .actions { display: flex; gap: 4px; }
        .actions button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #999;
            padding: 4px;
            transition: color 0.2s;
        }
        .actions button:active { color: #333; }

        .price-up { color: var(--up); }
        .price-down { color: var(--down); }
        .price-neutral { color: var(--text); }
        .change-up { background: var(--up-bg); color: var(--up); }
        .change-down { background: var(--down-bg); color: var(--down); }
        .change-neutral { color: var(--neutral); background: #f3f4f7; }

        .footer {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #999;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 360px;
        }
        .modal h3 { margin-bottom: 14px; font-size: 16px; }
        .modal input, .modal textarea {
            width: 100%;
            padding: 8px;
            margin: 6px 0 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
        }
        .modal-actions button {
            padding: 6px 16px;
            border-radius: 8px;
            border: none;
            background: #eef1f7;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <div class="header">
            <div class="interval-control">
                <button id="intervalMinus" title="减少刷新间隔">−</button>
                <span class="interval-display" id="intervalDisplay">5s</span>
                <button id="intervalPlus" title="增加刷新间隔">+</button>
            </div>
            <div class="action-buttons">
                <button id="syncBtn" title="同步设置">☁️</button>
                <button id="templateBtn" title="编辑复制模板">📝</button>
                <button id="hardRefreshAllBtn" title="硬刷新全部">🔄</button>
                <button id="addStockBtn" title="添加股票">＋</button>
            </div>
        </div>

        <!-- 添加面板 -->
        <div class="add-panel hidden" id="addPanel">
            <textarea id="stockInput" placeholder="输入代码，逗号分隔&#10;例如：603195,300033,00700" rows="3"></textarea>
            <div class="add-panel-actions">
                <select id="marketSelect">
                    <option value="auto">自动识别市场</option>
                    <option value="1">沪市</option>
                    <option value="0">深市</option>
                    <option value="116">港股</option>
                </select>
                <button id="confirmAddBtn">确认添加</button>
                <button id="cancelAddBtn">取消</button>
            </div>
        </div>

        <!-- 股票列表 -->
        <div class="stock-list" id="stockList"></div>

        <!-- 底部状态栏 -->
        <div class="footer">
            <span id="marketStatus">--</span>
            <span id="lastUpdate">--</span>
        </div>
    </div>

    <!-- 预警弹窗 -->
    <div class="modal-overlay hidden" id="alertModal">
        <div class="modal">
            <h3>设置预警 - <span id="alertStockName"></span></h3>
            <label>价格上限</label>
            <input type="number" id="alertPriceUp" step="0.01" placeholder="例如 40.00">
            <label>价格下限</label>
            <input type="number" id="alertPriceDown" step="0.01" placeholder="例如 35.00">
            <label>涨跌幅上限(%)</label>
            <input type="number" id="alertPercentUp" step="0.01" placeholder="例如 5.00">
            <label>涨跌幅下限(%)</label>
            <input type="number" id="alertPercentDown" step="0.01" placeholder="例如 -5.00">
            <div class="modal-actions">
                <button id="saveAlertBtn">保存</button>
                <button id="closeAlertModal">取消</button>
            </div>
        </div>
    </div>

    <!-- 模板弹窗 -->
    <div class="modal-overlay hidden" id="templateModal">
        <div class="modal">
            <h3>自定义复制模板</h3>
            <textarea id="templateInput" rows="4">请调用公开数据，用这套量化评估体系分析{名称} {代码}，当前价格按{最新价}元算。</textarea>
            <div class="modal-actions">
                <button id="saveTemplateBtn">保存</button>
                <button id="closeTemplateModal">取消</button>
            </div>
        </div>
    </div>

    <!-- 同步设置弹窗 -->
    <div class="modal-overlay hidden" id="syncModal">
        <div class="modal">
            <h3>GitHub Gist 同步设置</h3>
            <label>Gist ID</label>
            <input type="text" id="gistIdInput" placeholder="例如 a1b2c3d4e5f6...">
            <label>Personal Access Token</label>
            <input type="password" id="gistTokenInput" placeholder="ghp_xxxxxxxxxxxx">
            <div class="modal-actions">
                <button id="saveSyncBtn">保存并同步</button>
                <button id="closeSyncModal">取消</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== 配置 ==========
            const API_BASE = 'https://push2.eastmoney.com/api/qt/stock/get';
            const DEFAULT_INTERVAL = 5;
            const MIN_INTERVAL = 2;
            const MAX_INTERVAL = 300;
            const STORAGE_PREFIX = 'stock_monitor_';
            const GIST_API = 'https://api.github.com/gists';

            // ========== 内置 Gist 凭据 ==========
            const DEFAULT_GIST_ID = '894591c1511b85f9a36078202b544f49';
            const DEFAULT_TOKEN = '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';

            // ========== 状态变量 ==========
            let stockList = [];
            let settings = { interval: DEFAULT_INTERVAL };
            let cache = {};
            let copyTemplate = '请调用公开数据，用这套量化评估体系分析{名称} {代码}，当前价格按{最新价}元算。';
            let intervalId = null;
            let syncConfig = { gistId: DEFAULT_GIST_ID, token: DEFAULT_TOKEN };

            const $ = id => document.getElementById(id);

            // ========== 工具函数 ==========
            function isTradingHours() {
                const now = new Date();
                const day = now.getDay();
                if (day === 0 || day === 6) return false;
                const total = now.getHours() * 60 + now.getMinutes();
                return (total >= 570 && total < 690) || (total >= 780 && total < 900);
            }

            function getMarketByCode(code) {
                if (/^\d{6}$/.test(code)) {
                    if (code.startsWith('6')) return '1';
                    if (code.startsWith('0') || code.startsWith('3')) return '0';
                }
                return '116';
            }

            function getPriceDivisor(market) {
                return market === '116' ? 1000 : 100;
            }

            function formatChange(percent) {
                if (percent === undefined || percent === null) return '--';
                const actual = Math.abs(percent) > 10 ? percent / 100 : percent;
                return `${actual > 0 ? '+' : ''}${actual.toFixed(2)}%`;
            }

            function getPriceClass(data, divisor) {
                if (!data) return 'price-neutral';
                const change = data.f169 / divisor;
                return change > 0 ? 'price-up' : (change < 0 ? 'price-down' : 'price-neutral');
            }

            function getChangeClass(data, divisor) {
                if (!data) return 'change-neutral';
                const change = data.f169 / divisor;
                return change > 0 ? 'change-up' : (change < 0 ? 'change-down' : 'change-neutral');
            }

            function recalculateOffsets() {
                if (!stockList.length) return;
                const step = (settings.interval * 1000) / stockList.length;
                stockList.forEach((s, i) => { s.offset = Math.round(i * step); });
            }

            // ========== 本地存储 ==========
            function loadFromStorage(key, fallback) {
                try {
                    const raw = localStorage.getItem(STORAGE_PREFIX + key);
                    return raw ? JSON.parse(raw) : fallback;
                } catch (e) { return fallback; }
            }
            function saveToStorage(key, value) {
                localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
            }

            function loadAll() {
                stockList = loadFromStorage('stockList', []);
                settings = loadFromStorage('settings', { interval: DEFAULT_INTERVAL });
                cache = loadFromStorage('cache', {});
                copyTemplate = loadFromStorage('template', copyTemplate);

                // 同步配置：优先使用本地存储，若无则使用内置默认值
                const storedSync = loadFromStorage('syncConfig', null);
                if (storedSync && storedSync.gistId && storedSync.token) {
                    syncConfig = storedSync;
                } else {
                    syncConfig = { gistId: DEFAULT_GIST_ID, token: DEFAULT_TOKEN };
                }
                recalculateOffsets();
            }

            function saveStockList() {
                recalculateOffsets();
                saveToStorage('stockList', stockList);
                syncToGist();
            }
            function saveCache() {
                saveToStorage('cache', cache);
            }

            // ========== GitHub Gist 同步 ==========
            async function syncToGist() {
                if (!syncConfig.gistId || !syncConfig.token) return;
                try {
                    const content = JSON.stringify(stockList, null, 2);
                    await fetch(`${GIST_API}/${syncConfig.gistId}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `token ${syncConfig.token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            files: {
                                'stocks.json': { content }
                            }
                        })
                    });
                } catch (e) {
                    console.error('同步至 Gist 失败', e);
                }
            }

            async function pullFromGist() {
                if (!syncConfig.gistId || !syncConfig.token) return null;
                try {
                    const res = await fetch(`${GIST_API}/${syncConfig.gistId}`, {
                        headers: { 'Authorization': `token ${syncConfig.token}` }
                    });
                    if (!res.ok) throw new Error('获取失败');
                    const data = await res.json();
                    const file = data.files['stocks.json'];
                    if (file && file.content) {
                        return JSON.parse(file.content);
                    }
                } catch (e) {
                    console.error('从 Gist 拉取失败', e);
                }
                return null;
            }

            async function doSync() {
                if (!syncConfig.gistId || !syncConfig.token) {
                    alert('请先设置同步信息（点击☁️按钮）');
                    return;
                }
                const remoteList = await pullFromGist();
                if (remoteList && Array.isArray(remoteList)) {
                    if (remoteList.length === 0 && stockList.length === 0) return;
                    const codeMap = new Map();
                    stockList.forEach(s => codeMap.set(s.code, s));
                    remoteList.forEach(s => {
                        if (!codeMap.has(s.code)) {
                            codeMap.set(s.code, s);
                        }
                    });
                    const newList = Array.from(codeMap.values());
                    if (newList.length !== stockList.length || !newList.every((s, i) => s.code === stockList[i]?.code)) {
                        stockList = newList;
                        saveToStorage('stockList', stockList);
                        renderStockList();
                        await syncToGist();
                    }
                } else {
                    await syncToGist();
                }
            }

            // ========== 渲染股票列表 ==========
            function renderStockList() {
                const container = $('stockList');
                container.innerHTML = '';
                stockList.forEach(stock => {
                    const data = cache[stock.code]?.data;
                    const divisor = getPriceDivisor(stock.market);
                    const price = data ? data.f43 / divisor : null;
                    const changeAmount = data ? data.f169 / divisor : null;
                    const changePercent = data?.f170;
                    const high = data ? data.f44 / divisor : null;
                    const low = data ? data.f45 / divisor : null;

                    const item = document.createElement('div');
                    item.className = 'stock-item';
                    item.dataset.code = stock.code;
                    item.innerHTML = `
                        <div class="name-code">
                            <div class="name" title="${data?.f58 || stock.code}">${data?.f58 || stock.code}</div>
                            <div class="code">${stock.code}</div>
                        </div>
                        <div class="price-area">
                            <span class="price ${getPriceClass(data, divisor)}">${price ? price.toFixed(2) : '--'}</span>
                            <span class="change ${getChangeClass(data, divisor)}">
                                ${changeAmount !== null ? (changeAmount >= 0 ? '+' : '') + changeAmount.toFixed(2) : '--'}
                                <span class="percent">(${changePercent !== undefined ? formatChange(changePercent) : '--'})</span>
                            </span>
                        </div>
                        <div class="hl">
                            <span style="color:#e83942">H:${high ? high.toFixed(2) : '--'}</span>
                            <span style="color:#22a85d">L:${low ? low.toFixed(2) : '--'}</span>
                        </div>
                        <div class="actions">
                            <button class="copy-btn" title="复制分析指令">📋</button>
                            <button class="alert-btn" title="设置预警">🔔</button>
                            <button class="delete-btn" title="删除">✕</button>
                        </div>`;
                    container.appendChild(item);
                });
                attachEvents();
            }

            function attachEvents() {
                document.querySelectorAll('.copy-btn').forEach(b => b.addEventListener('click', handleCopy));
                document.querySelectorAll('.alert-btn').forEach(b => b.addEventListener('click', handleOpenAlert));
                document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', handleDelete));
            }

            // ========== 数据抓取 ==========
            async function fetchStock(code, forceHard = false) {
                const stock = stockList.find(s => s.code === code);
                if (!stock) return;
                const market = stock.market;
                const secid = `${market}.${code}`;
                const url = `${API_BASE}?secid=${secid}&fields=f43,f44,f45,f46,f47,f48,f50,f51,f52,f57,f58,f60,f116,f162,f169,f170,f171,f172&_=${Date.now()}`;
                try {
                    const resp = await fetch(url);
                    const json = await resp.json();
                    if (json?.data) {
                        cache[code] = { data: json.data, timestamp: Date.now() };
                        saveCache();
                        renderStockList();
                        checkAlert(code, json.data, market);
                        return json.data;
                    }
                    throw new Error('无数据');
                } catch (e) {
                    if (forceHard) {
                        delete cache[code];
                        saveCache();
                        renderStockList();
                    }
                    return null;
                }
            }

            async function hardRefreshAll() {
                for (const s of stockList) {
                    delete cache[s.code];
                    saveCache();
                }
                renderStockList();
                for (const s of stockList) {
                    await fetchStock(s.code, true);
                }
            }

            // ========== 预警 ==========
            function checkAlert(code, data, market) {
                const alert = loadFromStorage('alert_' + code, null);
                if (!alert) return;
                const divisor = getPriceDivisor(market);
                const price = data.f43 / divisor;
                const raw = data.f170;
                const change = Math.abs(raw) > 10 ? raw / 100 : raw;
                if ((alert.priceUp && price >= alert.priceUp) ||
                    (alert.priceDown && price <= alert.priceDown) ||
                    (alert.percentUp && change >= alert.percentUp) ||
                    (alert.percentDown && change <= alert.percentDown)) {
                    if (Notification.permission === 'granted') {
                        new Notification(`${data.f58 || code} 预警`, {
                            body: `价格 ${price.toFixed(2)}，涨跌幅 ${change.toFixed(2)}%`
                        });
                    }
                }
            }

            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }

            // ========== 添加/删除股票 ==========
            function addStocks(codesStr) {
                const raw = codesStr.split(/[,，\n\s]+/).map(c => c.trim()).filter(c => c);
                if (!raw.length) return;
                let changed = false;
                raw.forEach(r => {
                    let market = $('marketSelect').value === 'auto' ? getMarketByCode(r) : $('marketSelect').value;
                    let code = r;
                    if (market === '116') {
                        code = r.replace(/^0+/, '').padStart(5, '0');
                    }
                    if (!stockList.find(s => s.code === code)) {
                        stockList.push({ code, market, name: code, offset: 0 });
                        changed = true;
                        fetchStock(code, false);
                    }
                });
                if (changed) {
                    saveStockList();
                    renderStockList();
                }
            }

            function deleteStock(code) {
                stockList = stockList.filter(s => s.code !== code);
                delete cache[code];
                saveStockList();
                saveCache();
                renderStockList();
            }

            // ========== 复制指令 ==========
            function handleCopy(e) {
                const code = e.target.closest('.stock-item').dataset.code;
                const data = cache[code]?.data;
                if (!data) return;
                const stock = stockList.find(s => s.code === code);
                const divisor = getPriceDivisor(stock?.market || getMarketByCode(code));
                const name = data.f58 || code;
                const price = (data.f43 / divisor).toFixed(2);
                const rawChange = data.f170;
                const displayChange = Math.abs(rawChange) > 10 ? rawChange / 100 : rawChange;
                const text = copyTemplate
                    .replace(/\{名称\}/g, name)
                    .replace(/\{代码\}/g, code)
                    .replace(/\{最新价\}/g, price)
                    .replace(/\{涨跌幅\}/g, displayChange.toFixed(2) + '%')
                    .replace(/\{涨跌额\}/g, (data.f169 / divisor).toFixed(2))
                    .replace(/\{时间\}/g, new Date().toLocaleTimeString());
                navigator.clipboard.writeText(text).then(() => {
                    e.target.textContent = '✓';
                    setTimeout(() => { e.target.textContent = '📋'; }, 1500);
                });
            }

            function handleOpenAlert(e) {
                const code = e.target.closest('.stock-item').dataset.code;
                const name = cache[code]?.data?.f58 || code;
                $('alertStockName').textContent = name;
                $('alertModal').dataset.code = code;
                ['alertPriceUp','alertPriceDown','alertPercentUp','alertPercentDown'].forEach(id => $(id).value = '');
                $('alertModal').classList.remove('hidden');
            }

            function handleDelete(e) {
                deleteStock(e.target.closest('.stock-item').dataset.code);
            }

            // ========== 定时器 ==========
            function startTimer() {
                stopTimer();
                if (!isTradingHours()) return;
                intervalId = setInterval(() => {
                    const now = Date.now();
                    stockList.forEach(stock => {
                        const last = cache[stock.code]?.timestamp || 0;
                        if (now >= last + settings.interval * 1000 + stock.offset) {
                            fetchStock(stock.code, false);
                        }
                    });
                }, 1000);
            }
            function stopTimer() {
                if (intervalId) { clearInterval(intervalId); intervalId = null; }
            }

            function updateMarketStatus() {
                const now = new Date();
                const day = now.getDay();
                const total = now.getHours() * 60 + now.getMinutes();
                let status = '';
                if (day === 0 || day === 6) status = '📌 周末休市';
                else if (total < 570) status = '🌅 等待开盘';
                else if (total >= 570 && total < 690) status = '📈 交易中';
                else if (total >= 690 && total < 780) status = '🍵 午间休市';
                else if (total >= 780 && total < 900) status = '📈 交易中';
                else status = '🔔 已收盘';
                $('marketStatus').textContent = status;

                if (isTradingHours() && !intervalId) startTimer();
                else if (!isTradingHours() && intervalId) stopTimer();
            }

            // ========== 事件绑定 ==========
            function bindGlobalEvents() {
                $('intervalMinus').addEventListener('click', () => {
                    if (settings.interval > MIN_INTERVAL) {
                        settings.interval--;
                        saveToStorage('settings', settings);
                        $('intervalDisplay').textContent = `${settings.interval}s`;
                        recalculateOffsets();
                        startTimer();
                    }
                });
                $('intervalPlus').addEventListener('click', () => {
                    if (settings.interval < MAX_INTERVAL) {
                        settings.interval++;
                        saveToStorage('settings', settings);
                        $('intervalDisplay').textContent = `${settings.interval}s`;
                        recalculateOffsets();
                        startTimer();
                    }
                });

                // 同步按钮
                $('syncBtn').addEventListener('click', () => {
                    $('gistIdInput').value = syncConfig.gistId;
                    $('gistTokenInput').value = syncConfig.token;
                    $('syncModal').classList.remove('hidden');
                });

                $('templateBtn').addEventListener('click', () => {
                    $('templateInput').value = copyTemplate;
                    $('templateModal').classList.remove('hidden');
                });
                $('hardRefreshAllBtn').addEventListener('click', hardRefreshAll);
                $('addStockBtn').addEventListener('click', () => {
                    $('addPanel').classList.toggle('hidden');
                });
                $('confirmAddBtn').addEventListener('click', () => {
                    addStocks($('stockInput').value);
                    $('stockInput').value = '';
                    $('addPanel').classList.add('hidden');
                });
                $('cancelAddBtn').addEventListener('click', () => $('addPanel').classList.add('hidden'));
                $('closeAlertModal').addEventListener('click', () => $('alertModal').classList.add('hidden'));
                $('saveAlertBtn').addEventListener('click', () => {
                    const code = $('alertModal').dataset.code;
                    const alert = {
                        priceUp: parseFloat($('alertPriceUp').value) || null,
                        priceDown: parseFloat($('alertPriceDown').value) || null,
                        percentUp: parseFloat($('alertPercentUp').value) || null,
                        percentDown: parseFloat($('alertPercentDown').value) || null,
                    };
                    saveToStorage('alert_' + code, alert);
                    $('alertModal').classList.add('hidden');
                });
                $('closeTemplateModal').addEventListener('click', () => $('templateModal').classList.add('hidden'));
                $('saveTemplateBtn').addEventListener('click', () => {
                    copyTemplate = $('templateInput').value;
                    saveToStorage('template', copyTemplate);
                    $('templateModal').classList.add('hidden');
                });

                // 同步弹窗
                $('closeSyncModal').addEventListener('click', () => $('syncModal').classList.add('hidden'));
                $('saveSyncBtn').addEventListener('click', async () => {
                    const gistId = $('gistIdInput').value.trim();
                    const token = $('gistTokenInput').value.trim();
                    if (!gistId || !token) {
                        alert('请填写 Gist ID 和 Token');
                        return;
                    }
                    syncConfig = { gistId, token };
                    saveToStorage('syncConfig', syncConfig);
                    $('syncModal').classList.add('hidden');
                    await doSync();
                });
            }

            // ========== 启动 ==========
            async function init() {
                loadAll();
                $('intervalDisplay').textContent = `${settings.interval}s`;
                renderStockList();
                startTimer();
                setInterval(updateMarketStatus, 30000);
                updateMarketStatus();
                bindGlobalEvents();

                // 自动同步：如果已配置凭据，立即合并远程数据
                if (syncConfig.gistId && syncConfig.token) {
                    await doSync();
                }

                // 预加载所有股票数据
                stockList.forEach(s => {
                    if (!cache[s.code]) fetchStock(s.code, false);
                });
            }

            init();
        })();
    </script>
</body>
</html>
