<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GP-Tracker</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1a1a2e;
            --sub: #888;
            --up: #e83942;
            --down: #22a85d;
            --neutral: #666;
            --up-bg: #fef0f0;
            --down-bg: #eefaf3;
            --border: #e0e3eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container { width: 100%; max-width: 600px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .interval-control {
            display: flex;
            align-items: center;
            background: var(--card);
            border-radius: 24px;
            padding: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .interval-control button {
            width: 36px; height: 36px;
            border: none;
            background: transparent;
            font-size: 20px;
            cursor: pointer;
            color: #5a5a7a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .interval-display {
            padding: 0 12px;
            font-weight: 700;
            color: var(--text);
            font-size: 16px;
            min-width: 40px;
            text-align: center;
        }
        .action-buttons { display: flex; gap: 8px; }
        .action-buttons button {
            background: var(--card);
            border: none;
            border-radius: 50%;
            width: 36px; height: 36px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-panel {
            background: var(--card);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .add-panel textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            font-size: 15px;
            resize: vertical;
            font-family: inherit;
        }
        .add-panel-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            gap: 8px;
        }
        .add-panel-actions select,
        .add-panel-actions button {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #f8f9fc;
            font-size: 14px;
            cursor: pointer;
        }
        .hidden { display: none !important; }

        .sync-msg {
            text-align: center;
            font-size: 12px;
            color: var(--sub);
            padding: 4px 0;
            margin-bottom: 8px;
        }
        .sync-msg.error { color: #e83942; }

        .stock-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }
        .stock-item {
            background: var(--card);
            border-radius: 12px;
            padding: 10px 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sort-btns {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-right: 2px;
        }
        .sort-btns button {
            background: none;
            border: none;
            font-size: 12px;
            cursor: pointer;
            color: #999;
            padding: 0;
            line-height: 1;
        }
        .name-code { flex: 1.5; min-width: 0; }
        .name {
            font-weight: 700;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .code { font-size: 10px; color: var(--sub); }
        .price-area { flex: 1.5; text-align: right; }
        .price { font-size: 16px; font-weight: 800; }
        .change {
            font-size: 11px;
            font-weight: 600;
            padding: 1px 5px;
            border-radius: 5px;
            margin-left: 3px;
            white-space: nowrap;
        }
        .change .percent { font-size: 9px; opacity: 0.85; margin-left: 1px; }
        .hl {
            display: flex;
            gap: 6px;
            font-size: 10px;
            color: var(--sub);
            white-space: nowrap;
            flex: 1;
        }
        .actions { display: flex; gap: 3px; }
        .actions button {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #999;
            padding: 2px;
        }

        .price-up { color: var(--up); }
        .price-down { color: var(--down); }
        .price-neutral { color: var(--text); }
        .change-up { background: var(--up-bg); color: var(--up); }
        .change-down { background: var(--down-bg); color: var(--down); }
        .change-neutral { color: var(--neutral); background: #f3f4f7; }

        .footer {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #999;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 360px;
        }
        .modal h3 { margin-bottom: 14px; font-size: 16px; }
        .modal input, .modal textarea {
            width: 100%;
            padding: 8px;
            margin: 6px 0 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
        }
        .modal-actions button {
            padding: 6px 16px;
            border-radius: 8px;
            border: none;
            background: #eef1f7;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="interval-control">
                <button id="intervalMinus">−</button>
                <span class="interval-display" id="intervalDisplay">5s</span>
                <button id="intervalPlus">+</button>
            </div>
            <div class="action-buttons">
                <button id="syncBtn" title="同步设置">☁️</button>
                <button id="templateBtn" title="编辑复制模板">📝</button>
                <button id="hardRefreshAllBtn" title="硬刷新全部">🔄</button>
                <button id="addStockBtn" title="添加股票">＋</button>
            </div>
        </div>

        <div class="sync-msg hidden" id="syncMsg"></div>

        <div class="add-panel hidden" id="addPanel">
            <textarea id="stockInput" placeholder="输入代码，逗号分隔&#10;例如：603195,300033,00700" rows="3"></textarea>
            <div class="add-panel-actions">
                <select id="marketSelect">
                    <option value="auto">自动识别市场</option>
                    <option value="1">沪市</option>
                    <option value="0">深市</option>
                    <option value="116">港股</option>
                </select>
                <button id="confirmAddBtn">确认添加</button>
                <button id="cancelAddBtn">取消</button>
            </div>
        </div>

        <div class="stock-list" id="stockList"></div>

        <div class="footer">
            <span id="marketStatus">--</span>
            <span id="lastUpdate">--</span>
        </div>
    </div>

    <div class="modal-overlay hidden" id="alertModal">
        <div class="modal">
            <h3>设置预警 - <span id="alertStockName"></span></h3>
            <label>价格上限</label><input type="number" id="alertPriceUp" step="0.01">
            <label>价格下限</label><input type="number" id="alertPriceDown" step="0.01">
            <label>涨跌幅上限(%)</label><input type="number" id="alertPercentUp" step="0.01">
            <label>涨跌幅下限(%)</label><input type="number" id="alertPercentDown" step="0.01">
            <div class="modal-actions">
                <button id="saveAlertBtn">保存</button>
                <button id="closeAlertModal">取消</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="templateModal">
        <div class="modal">
            <h3>自定义复制模板</h3>
            <textarea id="templateInput" rows="4">请调用公开数据，用这套量化评估体系分析{名称} {代码}，当前价格按{最新价}元算。</textarea>
            <div class="modal-actions">
                <button id="saveTemplateBtn">保存</button>
                <button id="closeTemplateModal">取消</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="syncModal">
        <div class="modal">
            <h3>GitHub Gist 同步设置</h3>
            <label>Gist ID</label>
            <input type="text" id="gistIdInput" placeholder="自动填入或手动修改">
            <label>Personal Access Token</label>
            <input type="password" id="gistTokenInput" placeholder="首次使用需输入 Token">
            <div class="modal-actions">
                <button id="saveSyncBtn">保存并同步</button>
                <button id="closeSyncModal">取消</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const API_BASE = 'https://push2.eastmoney.com/api/qt/stock/get';
            const GIST_API = 'https://api.github.com/gists';
            // 内置 Gist ID（公开标识符，无安全风险）
            const DEFAULT_GIST_ID = '894591c1511b85f9a36078202b544f49';
            const STORAGE_PREFIX = 'stock_monitor_';

            let stockList = [], settings = { interval: 5 }, cache = {};
            let copyTemplate = '请调用公开数据，用这套量化评估体系分析{名称} {代码}，当前价格按{最新价}元算。';
            let intervalId = null;
            let syncConfig = { gistId: DEFAULT_GIST_ID, token: '' };

            const $ = id => document.getElementById(id);

            function showSyncMsg(text, isError = false) {
                const el = $('syncMsg');
                el.textContent = text;
                el.classList.remove('hidden', 'error');
                if (isError) el.classList.add('error');
                el.classList.remove('hidden');
            }

            function hideSyncMsg() { $('syncMsg').classList.add('hidden'); }

            function isTradingHours() {
                const now = new Date();
                if (now.getDay() === 0 || now.getDay() === 6) return false;
                const total = now.getHours() * 60 + now.getMinutes();
                return (total >= 570 && total < 690) || (total >= 780 && total < 900);
            }

            function getMarketByCode(code) {
                if (/^\d{6}$/.test(code)) {
                    if (code.startsWith('6')) return '1';
                    if (code.startsWith('0') || code.startsWith('3')) return '0';
                }
                return '116';
            }

            function getPriceDivisor(market) { return market === '116' ? 1000 : 100; }

            function formatChange(percent) {
                if (percent == null) return '--';
                const actual = Math.abs(percent) > 10 ? percent / 100 : percent;
                return `${actual > 0 ? '+' : ''}${actual.toFixed(2)}%`;
            }

            function getPriceClass(data, divisor) {
                if (!data) return 'price-neutral';
                const change = data.f169 / divisor;
                return change > 0 ? 'price-up' : (change < 0 ? 'price-down' : 'price-neutral');
            }

            function getChangeClass(data, divisor) {
                if (!data) return 'change-neutral';
                const change = data.f169 / divisor;
                return change > 0 ? 'change-up' : (change < 0 ? 'change-down' : 'change-neutral');
            }

            function recalculateOffsets() {
                if (!stockList.length) return;
                const step = (settings.interval * 1000) / stockList.length;
                stockList.forEach((s, i) => s.offset = Math.round(i * step));
            }

            function loadFromStorage(key, fallback) {
                try { return JSON.parse(localStorage.getItem(STORAGE_PREFIX + key)) || fallback; } catch { return fallback; }
            }
            function saveToStorage(key, value) {
                try { localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value)); } catch {}
            }

            function loadAll() {
                stockList = loadFromStorage('stockList', []);
                settings = loadFromStorage('settings', { interval: 5 });
                cache = loadFromStorage('cache', {});
                copyTemplate = loadFromStorage('template', copyTemplate);

                // 加载同步配置：优先使用本地存储，若无则使用内置 Gist ID（Token 留空）
                const stored = loadFromStorage('syncConfig', null);
                if (stored && stored.gistId && stored.token) {
                    syncConfig = stored;
                } else {
                    syncConfig = { gistId: DEFAULT_GIST_ID, token: '' };
                }
                recalculateOffsets();
            }

            function saveStockList() {
                recalculateOffsets();
                saveToStorage('stockList', stockList);
                if (syncConfig.token) syncToGist(); // 只有配置了 Token 才同步
            }
            function saveCache() { saveToStorage('cache', cache); }

            async function syncToGist() {
                if (!syncConfig.gistId || !syncConfig.token) return;
                try {
                    await fetch(`${GIST_API}/${syncConfig.gistId}`, {
                        method: 'PATCH',
                        headers: { 'Authorization': `token ${syncConfig.token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ files: { 'stocks.json': { content: JSON.stringify(stockList) } } })
                    });
                    hideSyncMsg();
                } catch (e) { console.error('上传Gist失败', e); }
            }

            async function pullFromGist() {
                if (!syncConfig.gistId || !syncConfig.token) throw new Error('未配置Token');
                const res = await fetch(`${GIST_API}/${syncConfig.gistId}`, {
                    headers: { 'Authorization': `token ${syncConfig.token}` }
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                return data.files?.['stocks.json'] ? JSON.parse(data.files['stocks.json'].content) : null;
            }

            async function doSync(silent = false) {
                if (!syncConfig.gistId || !syncConfig.token) {
                    if (!silent) showSyncMsg('未配置 Token，点击☁️输入', true);
                    return;
                }
                showSyncMsg('正在同步...');
                try {
                    const remoteList = await pullFromGist();
                    if (remoteList && Array.isArray(remoteList)) {
                        const map = new Map(stockList.map(s => [s.code, s]));
                        let changed = false;
                        remoteList.forEach(s => {
                            if (!map.has(s.code)) { map.set(s.code, s); changed = true; }
                        });
                        if (changed) {
                            stockList = Array.from(map.values());
                            saveToStorage('stockList', stockList);
                            renderStockList();
                            await syncToGist();
                        }
                        hideSyncMsg();
                        if (!silent) showSyncMsg('同步完成');
                        setTimeout(hideSyncMsg, 2000);
                    } else {
                        await syncToGist();
                        hideSyncMsg();
                    }
                } catch (e) {
                    showSyncMsg('同步失败：' + e.message, true);
                    if (!silent) throw e;
                }
            }

            function moveStock(index, direction) {
                if (direction === 'up' && index > 0) {
                    [stockList[index - 1], stockList[index]] = [stockList[index], stockList[index - 1]];
                } else if (direction === 'down' && index < stockList.length - 1) {
                    [stockList[index], stockList[index + 1]] = [stockList[index + 1], stockList[index]];
                } else {
                    return;
                }
                saveStockList();
                renderStockList();
            }

            function renderStockList() {
                const container = $('stockList');
                container.innerHTML = '';
                stockList.forEach((stock, index) => {
                    const data = cache[stock.code]?.data;
                    const divisor = getPriceDivisor(stock.market);
                    const price = data ? data.f43 / divisor : null;
                    const changeAmount = data ? data.f169 / divisor : null;
                    const changePercent = data?.f170;
                    const high = data ? data.f44 / divisor : null;
                    const low = data ? data.f45 / divisor : null;
                    const item = document.createElement('div');
                    item.className = 'stock-item';
                    item.dataset.code = stock.code;
                    item.innerHTML = `
                        <div class="sort-btns">
                            <button class="move-up" title="上移">▲</button>
                            <button class="move-down" title="下移">▼</button>
                        </div>
                        <div class="name-code">
                            <div class="name">${data?.f58 || stock.code}</div>
                            <div class="code">${stock.code}</div>
                        </div>
                        <div class="price-area">
                            <span class="price ${getPriceClass(data, divisor)}">${price ? price.toFixed(2) : '--'}</span>
                            <span class="change ${getChangeClass(data, divisor)}">
                                ${changeAmount !== null ? (changeAmount>=0?'+':'') + changeAmount.toFixed(2) : '--'}
                                <span class="percent">(${changePercent!=null ? formatChange(changePercent) : '--'})</span>
                            </span>
                        </div>
                        <div class="hl">
                            <span style="color:#e83942">H:${high?high.toFixed(2):'--'}</span>
                            <span style="color:#22a85d">L:${low?low.toFixed(2):'--'}</span>
                        </div>
                        <div class="actions">
                            <button class="copy-btn">📋</button>
                            <button class="alert-btn">🔔</button>
                            <button class="delete-btn">✕</button>
                        </div>`;
                    container.appendChild(item);
                });

                document.querySelectorAll('.move-up').forEach((btn, i) => {
                    btn.addEventListener('click', () => moveStock(i, 'up'));
                });
                document.querySelectorAll('.move-down').forEach((btn, i) => {
                    btn.addEventListener('click', () => moveStock(i, 'down'));
                });
                document.querySelectorAll('.copy-btn').forEach(b => b.addEventListener('click', handleCopy));
                document.querySelectorAll('.alert-btn').forEach(b => b.addEventListener('click', handleOpenAlert));
                document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', handleDelete));
            }

            async function fetchStock(code, forceHard = false) {
                const stock = stockList.find(s => s.code === code);
                if (!stock) return;
                const url = `${API_BASE}?secid=${stock.market}.${code}&fields=f43,f44,f45,f46,f47,f48,f50,f51,f52,f57,f58,f60,f116,f162,f169,f170,f171,f172&_=${Date.now()}`;
                try {
                    const resp = await fetch(url);
                    const json = await resp.json();
                    if (json?.data) {
                        cache[code] = { data: json.data, timestamp: Date.now() };
                        saveCache();
                        renderStockList();
                    }
                } catch {}
            }

            async function hardRefreshAll() {
                for (let s of stockList) { delete cache[s.code]; }
                saveCache();
                renderStockList();
                for (let s of stockList) await fetchStock(s.code, true);
            }

            function addStocks(str) {
                const codes = str.split(/[,，\n\s]+/).filter(c => c);
                let changed = false;
                codes.forEach(raw => {
                    let market = $('marketSelect').value === 'auto' ? getMarketByCode(raw) : $('marketSelect').value;
                    let code = raw;
                    if (market === '116') code = raw.replace(/^0+/, '').padStart(5, '0');
                    if (!stockList.find(s => s.code === code)) {
                        stockList.push({ code, market, offset: 0 });
                        changed = true;
                        fetchStock(code);
                    }
                });
                if (changed) { saveStockList(); renderStockList(); }
            }

            function deleteStock(code) {
                stockList = stockList.filter(s => s.code !== code);
                delete cache[code];
                saveStockList();
                saveCache();
                renderStockList();
            }

            function handleCopy(e) {
                const code = e.target.closest('.stock-item').dataset.code;
                const data = cache[code]?.data;
                if (!data) return;
                const stock = stockList.find(s => s.code === code);
                const divisor = getPriceDivisor(stock?.market);
                const text = copyTemplate
                    .replace(/\{名称\}/g, data.f58||code)
                    .replace(/\{代码\}/g, code)
                    .replace(/\{最新价\}/g, (data.f43/divisor).toFixed(2))
                    .replace(/\{涨跌幅\}/g, (Math.abs(data.f170)>10?data.f170/100:data.f170).toFixed(2)+'%')
                    .replace(/\{涨跌额\}/g, (data.f169/divisor).toFixed(2))
                    .replace(/\{时间\}/g, new Date().toLocaleTimeString());
                navigator.clipboard.writeText(text);
                e.target.textContent = '✓';
                setTimeout(() => e.target.textContent = '📋', 1500);
            }

            function handleOpenAlert(e) {
                const code = e.target.closest('.stock-item').dataset.code;
                $('alertStockName').textContent = cache[code]?.data?.f58 || code;
                $('alertModal').dataset.code = code;
                ['alertPriceUp','alertPriceDown','alertPercentUp','alertPercentDown'].forEach(id => $(id).value='');
                $('alertModal').classList.remove('hidden');
            }

            function handleDelete(e) { deleteStock(e.target.closest('.stock-item').dataset.code); }

            function startTimer() {
                clearInterval(intervalId);
                if (!isTradingHours()) return;
                intervalId = setInterval(() => {
                    const now = Date.now();
                    stockList.forEach(s => {
                        const last = cache[s.code]?.timestamp || 0;
                        if (now >= last + settings.interval*1000 + s.offset) fetchStock(s.code);
                    });
                }, 1000);
            }

            function updateMarketStatus() {
                const now = new Date();
                let status = '';
                if (now.getDay()===0||now.getDay()===6) status='📌 周末休市';
                else {
                    const t = now.getHours()*60+now.getMinutes();
                    if (t<570) status='🌅 等待开盘';
                    else if (t<690) status='📈 交易中';
                    else if (t<780) status='🍵 午间休市';
                    else if (t<900) status='📈 交易中';
                    else status='🔔 已收盘';
                }
                $('marketStatus').textContent = status;
                if (isTradingHours() && !intervalId) startTimer();
                else if (!isTradingHours() && intervalId) clearInterval(intervalId);
            }

            function bindEvents() {
                $('intervalMinus').onclick = () => {
                    if (settings.interval > 2) { settings.interval--; saveToStorage('settings', settings); $('intervalDisplay').textContent = settings.interval+'s'; recalculateOffsets(); startTimer(); }
                };
                $('intervalPlus').onclick = () => {
                    if (settings.interval < 300) { settings.interval++; saveToStorage('settings', settings); $('intervalDisplay').textContent = settings.interval+'s'; recalculateOffsets(); startTimer(); }
                };
                $('syncBtn').onclick = () => {
                    $('gistIdInput').value = syncConfig.gistId;
                    $('gistTokenInput').value = syncConfig.token;
                    $('syncModal').classList.remove('hidden');
                };
                $('templateBtn').onclick = () => { $('templateInput').value = copyTemplate; $('templateModal').classList.remove('hidden'); };
                $('hardRefreshAllBtn').onclick = hardRefreshAll;
                $('addStockBtn').onclick = () => $('addPanel').classList.toggle('hidden');
                $('confirmAddBtn').onclick = () => { addStocks($('stockInput').value); $('stockInput').value=''; $('addPanel').classList.add('hidden'); };
                $('cancelAddBtn').onclick = () => $('addPanel').classList.add('hidden');
                $('closeAlertModal').onclick = () => $('alertModal').classList.add('hidden');
                $('saveAlertBtn').onclick = () => {
                    const code = $('alertModal').dataset.code;
                    saveToStorage('alert_'+code, {
                        priceUp: +$('alertPriceUp').value||null,
                        priceDown: +$('alertPriceDown').value||null,
                        percentUp: +$('alertPercentUp').value||null,
                        percentDown: +$('alertPercentDown').value||null
                    });
                    $('alertModal').classList.add('hidden');
                };
                $('closeTemplateModal').onclick = () => $('templateModal').classList.add('hidden');
                $('saveTemplateBtn').onclick = () => { copyTemplate = $('templateInput').value; saveToStorage('template', copyTemplate); $('templateModal').classList.add('hidden'); };
                $('closeSyncModal').onclick = () => $('syncModal').classList.add('hidden');
                $('saveSyncBtn').onclick = async () => {
                    const gid = $('gistIdInput').value.trim(), tok = $('gistTokenInput').value.trim();
                    if (!gid || !tok) return alert('请填写 Gist ID 和 Token');
                    syncConfig = { gistId: gid, token: tok };
                    saveToStorage('syncConfig', syncConfig);
                    $('syncModal').classList.add('hidden');
                    await doSync();
                };
            }

            async function init() {
                loadAll();
                $('intervalDisplay').textContent = settings.interval + 's';
                renderStockList();
                startTimer();
                setInterval(updateMarketStatus, 30000);
                updateMarketStatus();
                bindEvents();

                // 如果已配置 Token，自动同步一次
                if (syncConfig.token) {
                    try {
                        await doSync(true);
                    } catch {
                        showSyncMsg('同步失败，2秒后重试...', true);
                        setTimeout(() => {
                            if (syncConfig.token) doSync(true).catch(() => showSyncMsg('仍无法同步，请点击☁️检查配置', true));
                        }, 2000);
                    }
                } else {
                    showSyncMsg('请点击 ☁️ 输入 Token 以启用同步', false);
                }

                stockList.forEach(s => { if (!cache[s.code]) fetchStock(s.code); });
            }

            init();
        })();
    </script>
</body>
</html>
